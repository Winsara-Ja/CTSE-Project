services:
  # API Gateway
  api-gateway:
    build: ./api-gateway
    ports:
      - "80:80"
    depends_on:
      - user-service
      - product-service
      - order-service
      - payment-service
    networks:
      - shopzone-network
    restart: unless-stopped

  # User Service
  user-service:
    build: ./user-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGODB_URI=${MONGODB_URI}/shopzone-users?retryWrites=true&w=majority&appName=ShopZone
      - JWT_SECRET=shopzone_jwt_secret_key_2024
      - JWT_EXPIRE=24h
      - NODE_ENV=development
    networks:
      - shopzone-network
    restart: unless-stopped

  # Product Service
  product-service:
    build: ./product-service
    ports:
      - "5002:5002"
    environment:
      - PORT=5002
      - MONGODB_URI=${MONGODB_URI}/shopzone-products?retryWrites=true&w=majority&appName=ShopZone
      - USER_SERVICE_URL=http://user-service:5001
      - NODE_ENV=development
    depends_on:
      - user-service
    networks:
      - shopzone-network
    restart: unless-stopped

  # Order Service
  order-service:
    build: ./order-service
    ports:
      - "5003:5003"
    environment:
      - PORT=5003
      - MONGODB_URI=${MONGODB_URI}/shopzone-orders?retryWrites=true&w=majority&appName=ShopZone
      - USER_SERVICE_URL=http://user-service:5001
      - PRODUCT_SERVICE_URL=http://product-service:5002
      - NODE_ENV=development
    depends_on:
      - user-service
      - product-service
    networks:
      - shopzone-network
    restart: unless-stopped

  # Payment Service
  payment-service:
    build: ./payment-service
    ports:
      - "5004:5004"
    environment:
      - PORT=5004
      - MONGODB_URI=${MONGODB_URI}/shopzone-payments?retryWrites=true&w=majority&appName=ShopZone
      - USER_SERVICE_URL=http://user-service:5001
      - ORDER_SERVICE_URL=http://order-service:5003
      - NODE_ENV=development
    depends_on:
      - user-service
      - order-service
    networks:
      - shopzone-network
    restart: unless-stopped

networks:
  shopzone-network:
    driver: bridge
